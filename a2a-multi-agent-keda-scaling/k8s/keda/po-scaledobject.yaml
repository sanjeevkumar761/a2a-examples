# KEDA ScaledObject for Purchase Order Agent
# Scales 0→5 pods based on Azure Service Bus queue depth.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: po-agent-scaler
  namespace: a2a-agents
  labels:
    app: po-agent
spec:
  scaleTargetRef:
    name: po-agent               # matches the Deployment name in po-agent.yaml
  minReplicaCount: 0              # scale to zero when idle
  maxReplicaCount: 5              # PO agent handles less volume than invoice
  cooldownPeriod: 300             # wait 5 min before scaling down
  pollingInterval: 15             # check queue every 15 seconds
  triggers:
  - type: azure-servicebus
    metadata:
      queueName: po-requests
      namespace: sb-a2a-demo
      messageCount: "3"
    authenticationRef:
      name: azure-servicebus-auth
