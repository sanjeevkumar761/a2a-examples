apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: a2a-agents
  labels:
    app: orchestrator
    agent-type: coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        agent-type: coordinator
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: default
      containers:
      - name: orchestrator
        image: acra2ademo584.azurecr.io/a2a-orchestrator:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: AGENT_URL
          value: "http://orchestrator-svc:8000"
        - name: INVOICE_AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: INVOICE_AGENT_URL
        - name: PO_AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: PO_AGENT_URL
        - name: USE_SERVICEBUS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: USE_SERVICEBUS
        - name: SERVICEBUS_FQDN
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: SERVICEBUS_FQDN
        envFrom:
        - secretRef:
            name: azure-openai-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-svc
  namespace: a2a-agents
spec:
  selector:
    app: orchestrator
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer
