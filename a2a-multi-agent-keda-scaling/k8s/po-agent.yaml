apiVersion: apps/v1
kind: Deployment
metadata:
  name: po-agent
  namespace: a2a-agents
  labels:
    app: po-agent
    agent-type: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: po-agent
  template:
    metadata:
      labels:
        app: po-agent
        agent-type: worker
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
    spec:
      serviceAccountName: default
      containers:
      - name: po-agent
        image: acra2ademo584.azurecr.io/a2a-po-agent:latest
        ports:
        - containerPort: 8002
        env:
        - name: PORT
          value: "8002"
        - name: AGENT_URL
          value: "http://po-agent-svc:8002"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: REDIS_URL
        - name: USE_SERVICEBUS
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: USE_SERVICEBUS
        - name: SERVICEBUS_FQDN
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: SERVICEBUS_FQDN
        envFrom:
        - secretRef:
            name: azure-openai-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /.well-known/agent.json
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: po-agent-svc
  namespace: a2a-agents
spec:
  selector:
    app: po-agent
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
