services:
  # Redis for KEDA scaling metrics
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Invoice Validation Agent
  invoice-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.invoice
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - AGENT_URL=http://invoice-agent:8001
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/.well-known/agent.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Purchase Order Agent  
  po-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.po
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - AGENT_URL=http://po-agent:8002
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/.well-known/agent.json"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Orchestrator Agent
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - AGENT_URL=http://orchestrator:8000
      - INVOICE_AGENT_URL=http://invoice-agent:8001
      - PO_AGENT_URL=http://po-agent:8002
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - invoice-agent
      - po-agent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/.well-known/agent.json"]
      interval: 30s
      timeout: 10s
      retries: 3
